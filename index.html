<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spellcaster Jewellery</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0d001a;
    color: white;
    overflow-x: hidden;
}

/* BACKGROUND SLIDER */
.bg-slider {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    z-index: -2;
}

.slide-track {
    display: flex;
    width: calc(350px * 12);
    animation: scroll 50s linear infinite;
}

.slide-track img {
    width: 350px;
    height: 100vh;
    object-fit: cover;
    opacity: 0.25;
    filter: blur(3px);
}

/* ANIMATION */
@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

/* OVERLAY */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(180,156,200,0.2), #0d001a);
    z-index: -1;
}

/* HEADER */
header {
    display: flex;
    justify-content: center;
    padding: 20px;
}

.logo img {
    height: 60px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 120px 20px;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    background: linear-gradient(90deg,#c8a2c8,#7a5ca3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    opacity: 0.8;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
    gap: 30px;
    padding: 60px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 15px;
    backdrop-filter: blur(15px);
    transition: 0.4s;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 20px 40px rgba(180,156,200,0.3);
}

.card img {
    width: 100%;
    border-radius: 15px;
}

.btn {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 20px;
    border-radius: 30px;
    text-decoration: none;
    background: linear-gradient(90deg,#7a5ca3,#c8a2c8);
    color: black;
    font-weight: bold;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #25D366;
    padding: 15px 18px;
    border-radius: 50px;
    text-decoration: none;
    color: white;
    font-size: 16px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    opacity: 0.6;
}

</style>
</head>

<body>

<!-- MOVING BACKGROUND -->
<div class="bg-slider">
  <div class="slide-track">
    <img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
    <img src="https://images.unsplash.com/photo-1602751584552-8ba73aad10e1">
    <img src="https://images.unsplash.com/photo-1588444650700-6a9d7e1c9c0c">
    <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
    <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f">
    <img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
  </div>
</div>

<header>
    <div class="logo">
        <img src="logo.png">
    </div>
</header>

<section class="hero">
    <h1>Spellcaster</h1>
    <p>Enchanting Jewellery for Modern Elegance</p>
</section>

<section class="products" id="productContainer"></section>

<a href="https://wa.me/917091426608?text=Hi%20Spellcaster%2C%20I%20am%20interested%20in%20your%20jewellery" 
class="whatsapp" target="_blank">
💬 Chat
</a>

<footer>
    © 2026 Spellcaster Jewellery
</footer>

<script>

const asins = [
"B0FK43P1JQ",
"B0FK43YC42",
"B0FK24QXPB",
"B0FK25FBS4",
"B0FK24RKVM",
"B0FG1RH6RC",
"B0FG1PBRSG",
"B0FDY37D5S",
"B0FDYH8RCV",
"B0FDN23DM3",
"B0FDN2DKP6",
"B0FDM6VVWP",
"B0FDMQLN3G"
];

const container = document.getElementById("productContainer");

asins.forEach(asin => {

    const productURL = `https://www.amazon.in/dp/${asin}`;
    const imageURL = `https://images-na.ssl-images-amazon.com/images/P/${asin}.01._SX300_.jpg`;

    const card = `
    <div class="card">
        <img src="${imageURL}" onerror="this.src='fallback.jpg'">
        <h3>Spellcaster Collection</h3>
        <a href="${productURL}" target="_blank" class="btn">Buy Now</a>
    </div>
    `;

    container.innerHTML += card;
});

</script>

</body>
</html>
